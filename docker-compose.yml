services:
  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    volumes:
      # Postgres stores its data in /var/lib/postgresql/data — mounting a named
      # volume there is what actually persists the database across recreations.
      - pgdata:/var/lib/postgresql/data
    env_file:
      - docker.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - postgres

volumes:
  redis_data:
  pgdata:

networks:
  postgres:
    driver: bridge
